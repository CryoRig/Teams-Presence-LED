[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Upload & Debug ────────────────────────────────────────────────────────────
; Uses the ESP32-S3 built-in USB Serial/JTAG controller (GPIO19/20).
; No external probe required. One USB cable handles flashing, serial, and JTAG.
upload_protocol = esp-builtin
debug_tool      = esp-builtin

; ── Serial monitor ────────────────────────────────────────────────────────────
monitor_speed   = 115200
monitor_eol     = LF         ; send \n (matches the protocol spec)
monitor_echo    = yes        ; echo typed characters locally
monitor_filters = send_on_enter, esp32_exception_decoder

; ── Library dependencies ──────────────────────────────────────────────────────
lib_deps =
    fastled/FastLED
